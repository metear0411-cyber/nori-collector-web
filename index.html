<title>노리 직무기술서 작성</title>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    background: #eef2ea; color: #2c352c; line-height: 1.5; }
  button { font-family: inherit; cursor: pointer; }

  /* 시작 화면 */
  #start { position: fixed; inset: 0; background: #eef2ea; display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .start-card { background: #fff; border-radius: 18px; padding: 32px 28px; max-width: 420px; width: 100%; box-shadow: 0 8px 30px rgba(60,74,56,.12); }
  .start-card h1 { font-size: 21px; color: #3a4a38; font-weight: 800; }
  .start-card p { font-size: 13px; color: #6f7a6d; margin: 6px 0 20px; }
  .start-card label { font-size: 13px; font-weight: 700; color: #4f5a4d; display: block; margin-bottom: 6px; }
  .start-card input { width: 100%; padding: 12px 14px; border: 1px solid #cdd8c6; border-radius: 10px; font-size: 16px; margin-bottom: 18px; }
  .jobpick { display: flex; gap: 8px; margin-bottom: 22px; }
  .jobpick button { flex: 1; padding: 14px 0; border: 1px solid #cdd8c6; background: #f6f9f3; border-radius: 10px; font-size: 15px; font-weight: 700; color: #5a7a5a; }
  .jobpick button.on { background: #5a7a5a; color: #fff; border-color: #5a7a5a; }
  .start-card .go { width: 100%; padding: 14px; background: #5a7a5a; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 800; }
  .start-card .go:disabled { background: #c2cdbd; }
  .resume { font-size: 12px; color: #8a948a; margin-top: 14px; text-align: center; }
  .resume a { color: #5a7a5a; font-weight: 700; cursor: pointer; text-decoration: underline; }

  /* 헤더 */
  header { background: #fff; border-bottom: 1px solid #dde4d8; padding: 12px 18px; position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header .who { font-size: 16px; font-weight: 800; color: #3a4a38; }
  header .cnt { font-size: 13px; color: #5a7a5a; background: #eaf0e6; padding: 4px 12px; border-radius: 20px; font-weight: 700; }
  header .sp { flex: 1; }
  header button { border: 1px solid #cdd8c6; background: #fff; border-radius: 9px; padding: 9px 16px; font-size: 14px; font-weight: 700; color: #4f5a4d; }
  header button.prim { background: #5a7a5a; color: #fff; border-color: #5a7a5a; }

  /* 본문 2단 */
  .cols { display: grid; grid-template-columns: 1fr 380px; gap: 16px; max-width: 1180px; margin: 0 auto; padding: 16px; align-items: start; }
  .panel { background: #fff; border: 1px solid #dde4d8; border-radius: 14px; padding: 14px; }
  .mine { position: sticky; top: 70px; }
  .panel h2 { font-size: 15px; font-weight: 800; color: #3a4a38; margin-bottom: 10px; }

  .search { width: 100%; padding: 10px 12px; border: 1px solid #cdd8c6; border-radius: 9px; font-size: 14px; margin-bottom: 10px; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .chip { font-size: 12px; padding: 5px 11px; border: 1px solid #cdd8c6; border-radius: 16px; background: #f6f9f3; color: #5a7a5a; font-weight: 600; }
  .chip.on { background: #5a7a5a; color: #fff; border-color: #5a7a5a; }

  .sec-title { font-size: 13px; font-weight: 800; color: #7a857a; margin: 14px 0 8px; }
  .item { border: 1px solid #e2e8dd; border-radius: 10px; padding: 10px 12px; margin-bottom: 7px; cursor: pointer; display: flex; gap: 10px; align-items: flex-start; transition: .12s; }
  .item:hover { border-color: #5a7a5a; background: #f9fbf7; }
  .item.picked { opacity: .45; background: #eef2ea; }
  .item .chk { width: 20px; height: 20px; border: 2px solid #c2cdbd; border-radius: 6px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; }
  .item.picked .chk { background: #5a7a5a; border-color: #5a7a5a; }
  .item .body { flex: 1; min-width: 0; }
  .item .nm { font-size: 14px; font-weight: 600; color: #2c352c; }
  .item .ds { font-size: 11.5px; color: #8a948a; margin-top: 2px; }
  .item .tags { margin-top: 4px; }
  .tag { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 6px; margin: 2px 4px 0 0; }
  .t-area { background: #eaf0e6; color: #5a7a5a; }
  .t-sys { background: #e6eef5; color: #4a6a8a; }
  .t-pub { background: #f7eecb; color: #8a6d12; font-weight: 700; }
  .t-dep { background: #f0d2d2; color: #9e3b3b; font-weight: 700; }
  .item.dep { opacity: .6; }
  .item.dep .nm { color: #9e3b3b; }

  /* 내 직무기술서 */
  .add { display: flex; gap: 6px; margin-bottom: 12px; }
  .add input { flex: 1; padding: 9px 11px; border: 1px solid #cdd8c6; border-radius: 8px; font-size: 13px; }
  .add select { padding: 9px 6px; border: 1px solid #cdd8c6; border-radius: 8px; font-size: 13px; }
  .add button { background: #5a7a5a; color: #fff; border: none; border-radius: 8px; padding: 0 14px; font-weight: 800; }
  .mine-empty { font-size: 13px; color: #a0a99c; text-align: center; padding: 30px 0; }
  .mrow { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px dashed #e2e8dd; font-size: 13.5px; }
  .mrow .x { color: #b85c5c; font-weight: 800; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
  .mrow .mnm { flex: 1; }
  .mrow .mcyc { font-size: 11px; color: #8a948a; }
  .mrow.custom .mnm::after { content: " (직접추가)"; font-size: 10px; color: #b8932a; }

  .hint { font-size: 12px; color: #8a948a; margin-top: 12px; line-height: 1.6; }
  .mrow.flash { animation: flashbg 1.1s ease; }
  @keyframes flashbg { 0% { background: #cfe3c2; } 100% { background: transparent; } }

  /* 즉시 피드백 토스트 */
  #toast { position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%) translateY(16px);
    background: #3a4a38; color: #fff; padding: 11px 22px; border-radius: 24px; font-size: 14px; font-weight: 700;
    opacity: 0; pointer-events: none; transition: .22s; z-index: 90; box-shadow: 0 8px 22px rgba(0,0,0,.22); max-width: 90vw; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.rm { background: #9e6b4a; }

  /* 모바일 하단 바 */
  #mobileBar { display: none; }
  @media (max-width: 820px) {
    #mobileBar { display: flex; position: fixed; left: 0; right: 0; bottom: 0; background: #5a7a5a; color: #fff;
      padding: 13px 18px; align-items: center; gap: 12px; z-index: 70; box-shadow: 0 -4px 16px rgba(0,0,0,.14); }
    #mobileBar .mb-cnt { font-weight: 800; font-size: 15px; flex: 1; }
    #mobileBar button { background: #fff; color: #5a7a5a; border: none; border-radius: 8px; padding: 9px 15px; font-weight: 800; font-size: 14px; }
    .cols { padding-bottom: 78px; }
    #toast { bottom: 92px; }
  }

  /* 미리보기/출력 */
  #preview { display: none; }
  @media print {
    #start, header, .cols { display: none !important; }
    #preview { display: block !important; }
  }
  #preview.show { display: block; position: fixed; inset: 0; background: #fff; z-index: 60; overflow: auto; padding: 30px; }
  .pv-tools { max-width: 800px; margin: 0 auto 16px; display: flex; gap: 8px; }
  .pv-tools button { border: 1px solid #cdd8c6; background: #fff; border-radius: 9px; padding: 9px 16px; font-weight: 700; }
  .pv-tools button.prim { background: #5a7a5a; color: #fff; border-color: #5a7a5a; }
  .doc { max-width: 800px; margin: 0 auto; }
  .doc h1 { text-align: center; font-size: 22px; margin-bottom: 18px; }
  .doc table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  .doc th, .doc td { border: 1px solid #999; padding: 7px 9px; font-size: 13px; text-align: left; vertical-align: top; }
  .doc th { background: #eef2ea; font-weight: 700; }
  .doc .meta td { width: 25%; }

  @media (max-width: 820px) {
    .cols { grid-template-columns: 1fr; }
    .mine { position: static; }
  }
</style>

<div id="start">
  <div class="start-card">
    <h1>🗂️ 내 직무기술서 만들기</h1>
    <p>노리주간보호센터 · 내가 하는 업무를 골라 담기만 하면 됩니다. 담당·중요도는 원장님이 정합니다.</p>
    <label>이름</label>
    <input id="staffName" placeholder="예: 김민우" autocomplete="off">
    <label>직종</label>
    <div class="jobpick" id="jobPick"></div>
    <button class="go" id="goBtn" disabled>시작하기</button>
    <div class="resume" id="resumeBox"></div>
  </div>
</div>

<header style="display:none" id="appHeader">
  <span class="who" id="whoLabel"></span>
  <span class="cnt" id="cntLabel">0개 담음</span>
  <span class="sp"></span>
  <button id="previewBtn">미리보기·출력</button>
  <button class="prim" id="saveBtn">저장(파일)</button>
</header>

<div class="cols" id="app" style="display:none">
  <div class="panel pool">
    <h2>업무 풀 — 내가 하는 일을 누르세요</h2>
    <input class="search" id="search" placeholder="🔍 업무 검색 (예: 송영, 투약, 청구)">
    <div class="chips" id="cycleChips"></div>
    <div id="poolList"></div>
  </div>
  <div class="panel mine">
    <h2>내 직무기술서 <span id="mineCnt" style="color:#5a7a5a"></span></h2>
    <div class="add">
      <input id="customTask" placeholder="목록에 없는 내 업무 직접 추가">
      <select id="customCycle">
        <option value="daily">매일</option><option value="weekly">매주</option>
        <option value="monthly">매월</option><option value="quarterly">분기</option>
        <option value="semiannual">반기</option><option value="yearly">연간</option>
        <option value="adhoc" selected>수시</option>
      </select>
      <button id="addBtn">추가</button>
    </div>
    <div id="mineList"></div>
    <div class="hint">담은 업무는 자동 저장됩니다. 다 고르면 <b>저장(파일)</b>을 눌러 원장님께 보내주세요.</div>
  </div>
</div>

<div id="toast"></div>
<div id="mobileBar"><span class="mb-cnt" id="mbCnt">0개 담음</span><button id="mbView">내 목록 보기 ▲</button></div>

<div id="preview">
  <div class="pv-tools">
    <button id="pvClose">← 돌아가기</button>
    <button class="prim" onclick="window.print()">🖨️ 인쇄 / PDF 저장</button>
    <button class="prim" id="xlsBtn">📊 엑셀(.xls) 다운로드</button>
  </div>
  <div class="doc" id="docBody"></div>
</div>

<script>

"desc": "입퇴사·변경 시 인사 서류 관리", "src_count": 1, "aliases": ["인사서류 및 관리"], "publish": false, "status": "active", "note": ""}, {"id": "SOC-A27", "task": "각종 훈련·교육일지 작성", "cycle": "adhoc", "area": "기록", "systems": ["케어포"], "desc": "각종 훈련 및 교육 일지 작성", "src_count": 1, "aliases": [], "publish": false, "status": "active", "note": ""}]}}};
const CYCLES = [["daily","매일"],["weekly","매주"],["monthly","매월"],["quarterly","분기"],["semiannual","반기"],["yearly","연간"],["adhoc","수시"]];
const CL = Object.fromEntries(CYCLES);
const LSKEY = "nori-jd-collector";
let state = { staff:"", job:"", picked:{}, custom:[] }; // picked: id->true
let filterCycle = "all", searchQ = "";

// ---------- 시작 화면 ----------
const jobNames = Object.keys(PRESET.jobs);
const jobPick = document.getElementById("jobPick");
let pickedJob = "";
jobNames.forEach(j => {
  const b = document.createElement("button"); b.textContent = j;
  b.onclick = () => { pickedJob = j; [...jobPick.children].forEach(c=>c.classList.toggle("on", c===b)); checkGo(); };
  jobPick.appendChild(b);
});
const nameInput = document.getElementById("staffName");
const goBtn = document.getElementById("goBtn");
nameInput.oninput = checkGo;
function checkGo(){ goBtn.disabled = !(nameInput.value.trim() && pickedJob); }
goBtn.onclick = () => start(nameInput.value.trim(), pickedJob);

// 이어서 작성
const saved = localStorage.getItem(LSKEY);
if (saved) {
  try {
    const s = JSON.parse(saved);
    if (s.staff && s.job) {
      document.getElementById("resumeBox").innerHTML =
        `<a id="resumeLink">${s.staff}(${s.job}) 이어서 작성</a>`;
      document.getElementById("resumeLink").onclick = () => { state = s; start(s.staff, s.job); };
    }
  } catch(e){}
}

function start(staff, job) {
  state.staff = staff; state.job = job;
  if (!state.picked) state.picked = {};
  if (!state.custom) state.custom = [];
  document.getElementById("start").style.display = "none";
  document.getElementById("appHeader").style.display = "flex";
  document.getElementById("app").style.display = "grid";
  document.getElementById("whoLabel").textContent = `${staff} 님 · ${job}`;
  buildChips(); renderPool(); renderMine(); persist();
}

// ---------- 필터 칩 ----------
function buildChips() {
  const el = document.getElementById("cycleChips");
  const mk = (key, label) => { const c = document.createElement("button"); c.className = "chip" + (key===filterCycle?" on":""); c.textContent = label; c.onclick = () => { filterCycle = key; buildChips(); renderPool(); }; return c; };
  el.innerHTML = ""; el.appendChild(mk("all","전체"));
  CYCLES.forEach(([k,l]) => el.appendChild(mk(k,l)));
}

// ---------- 풀 렌더 ----------
document.getElementById("search").oninput = e => { searchQ = e.target.value.trim(); renderPool(); };
function tasksOfJob(){ return PRESET.jobs[state.job].tasks; }
function renderPool() {
  const list = document.getElementById("poolList");
  list.innerHTML = "";
  const tasks = tasksOfJob().filter(t => {
    if (filterCycle !== "all" && t.cycle !== filterCycle) return false;
    if (searchQ) { const blob = (t.task + " " + (t.desc||"") + " " + (t.aliases||[]).join(" ") + " " + t.area); if (!blob.toLowerCase().includes(searchQ.toLowerCase())) return false; }
    return true;
  });
  CYCLES.forEach(([ck,label]) => {
    const items = tasks.filter(t => t.cycle === ck);
    if (!items.length) return;
    const h = document.createElement("div"); h.className = "sec-title"; h.textContent = `${label} (${items.length})`; list.appendChild(h);
    items.forEach(t => list.appendChild(poolItem(t)));
  });
  if (!list.children.length) list.innerHTML = '<div class="mine-empty">검색 결과가 없습니다</div>';
}
function poolItem(t) {
  const dep = t.status === "deprecated_candidate";
  const el = document.createElement("div");
  el.className = "item" + (state.picked[t.id] ? " picked" : "") + (dep ? " dep" : "");
  el.draggable = true;
  el.ondragstart = e => e.dataTransfer.setData("text/id", t.id);
  const sys = (t.systems||[]).map(s=>`<span class="tag t-sys">${s}</span>`).join("");
  const pub = t.publish ? '<span class="tag t-pub">★공시</span>' : "";
  const depTag = dep ? '<span class="tag t-dep">폐지후보</span>' : "";
  el.innerHTML = `<div class="chk">${state.picked[t.id]?"✓":""}</div>
    <div class="body"><div class="nm">${t.task}</div>
    <div class="ds">${t.desc||""}</div>
    <div class="tags"><span class="tag t-area">${t.area}</span>${sys}${pub}${depTag}</div></div>`;
  el.onclick = () => togglePick(t.id);
  return el;
}
let lastFlash = null, toastTimer;
function showToast(msg, isRemove) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.toggle("rm", !!isRemove); el.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove("show"), 1600);
}
function togglePick(id) {
  const adding = !state.picked[id];
  const t = tasksOfJob().find(x => x.id === id);
  if (adding) state.picked[id] = true; else delete state.picked[id];
  lastFlash = adding ? id : null;
  renderPool(); renderMine(); persist();
  showToast(adding ? `✓ '${t.task}' 담음` : `✕ '${t.task}' 뺌`, !adding);
}

// ---------- 내 직무기술서 ----------
const mineList = document.getElementById("mineList");
mineList.ondragover = e => e.preventDefault();
mineList.ondrop = e => { const id = e.dataTransfer.getData("text/id"); if (id && !state.picked[id]) { state.picked[id]=true; renderPool(); renderMine(); persist(); } };
function renderMine() {
  const picked = tasksOfJob().filter(t => state.picked[t.id]);
  const total = picked.length + state.custom.length;
  document.getElementById("cntLabel").textContent = `${total}개 담음`;
  document.getElementById("mineCnt").textContent = `(${total})`;
  document.getElementById("mbCnt").textContent = `${total}개 담음`;
  mineList.innerHTML = "";
  if (!total) { mineList.innerHTML = '<div class="mine-empty">왼쪽에서 내가 하는 업무를<br>눌러 담아주세요</div>'; lastFlash = null; return; }
  CYCLES.forEach(([ck,label]) => {
    const rows = picked.filter(t => t.cycle === ck).map(t => ({nm:t.task, cyc:label, custom:false, id:t.id}))
      .concat(state.custom.filter(c => c.cycle === ck).map((c,i) => ({nm:c.task, cyc:label, custom:true, idx: state.custom.indexOf(c)})));
    if (!rows.length) return;
    const h = document.createElement("div"); h.className = "sec-title"; h.textContent = label; mineList.appendChild(h);
    rows.forEach(r => {
      const isFlash = !r.custom && r.id === lastFlash;
      const row = document.createElement("div"); row.className = "mrow" + (r.custom?" custom":"") + (isFlash?" flash":"");
      row.innerHTML = `<span class="mnm">${r.nm}</span><span class="x">✕</span>`;
      row.querySelector(".x").onclick = () => { if (r.custom) state.custom.splice(r.idx,1); else delete state.picked[r.id]; renderPool(); renderMine(); persist(); };
      if (isFlash) setTimeout(() => row.scrollIntoView({block:"nearest", behavior:"smooth"}), 30);
      mineList.appendChild(row);
    });
  });
  lastFlash = null;
}
document.getElementById("addBtn").onclick = addCustom;
document.getElementById("customTask").addEventListener("keydown", e => { if (e.key==="Enter") addCustom(); });
function addCustom() {
  const inp = document.getElementById("customTask"); const v = inp.value.trim(); if (!v) return;
  state.custom.push({ task: v, cycle: document.getElementById("customCycle").value, area: "기타", custom: true });
  inp.value = ""; renderMine(); persist();
  showToast(`✓ '${v}' 추가`);
}

// ---------- 저장/출력 ----------
function persist(){ localStorage.setItem(LSKEY, JSON.stringify(state)); }
function buildExport() {
  const picked = tasksOfJob().filter(t => state.picked[t.id]).map(t => ({
    id:t.id, task:t.task, cycle:t.cycle, area:t.area, systems:t.systems, publish:t.publish, status:t.status, desc:t.desc
  }));
  return { version:"collector-1", staff:state.staff, job:state.job,
    savedAt: new Date().toISOString().slice(0,10),
    selected: picked, custom: state.custom };
}
document.getElementById("saveBtn").onclick = () => {
  const data = buildExport();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = `직무기술서_${state.staff}_${data.savedAt}.json`; a.click();
};
document.getElementById("previewBtn").onclick = showPreview;
document.getElementById("pvClose").onclick = () => document.getElementById("preview").classList.remove("show");
function showPreview() {
  const picked = tasksOfJob().filter(t => state.picked[t.id]);
  let rows = "";
  CYCLES.forEach(([ck,label]) => {
    const items = picked.filter(t=>t.cycle===ck).map(t=>({nm:t.task,ds:t.desc||"",sys:(t.systems||[]).join(", ")}))
      .concat(state.custom.filter(c=>c.cycle===ck).map(c=>({nm:c.task+" (직접추가)",ds:"",sys:""})));
    items.forEach((it,i) => {
      rows += `<tr>${i===0?`<td rowspan="${items.length}"><b>${label}</b></td>`:""}<td>${it.nm}</td><td>${it.ds}</td><td>${it.sys}</td></tr>`;
    });
  });
  const total = picked.length + state.custom.length;
  document.getElementById("docBody").innerHTML = `
    <h1>직무기술서</h1>
    <table class="meta"><tr><th>성명</th><td>${state.staff}</td><th>직종</th><td>${state.job}</td></tr>
    <tr><th>소속</th><td>노리주간보호센터</td><th>작성일</th><td>${buildExport().savedAt}</td></tr>
    <tr><th>업무 수</th><td colspan="3">${total}개</td></tr></table>
    <table><thead><tr><th style="width:70px">주기</th><th style="width:200px">업무명</th><th>업무 내용</th><th style="width:120px">시스템</th></tr></thead><tbody>${rows||'<tr><td colspan="4">담은 업무 없음</td></tr>'}</tbody></table>`;
  document.getElementById("preview").classList.add("show");
}

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function exportExcel(){
  const picked = tasksOfJob().filter(t => state.picked[t.id]);
  const d = buildExport();
  let rows = "";
  CYCLES.forEach(([ck,label]) => {
    const items = picked.filter(t=>t.cycle===ck).map(t=>({nm:t.task, ds:t.desc||"", ar:t.area, sys:(t.systems||[]).join(", ")}))
      .concat(state.custom.filter(c=>c.cycle===ck).map(c=>({nm:c.task+" (직접추가)", ds:"", ar:"기타", sys:""})));
    items.forEach((it,i) => { rows += `<tr>${i===0?`<td rowspan="${items.length}" style="background:#eef2ea;font-weight:bold;text-align:center;vertical-align:middle">${label}</td>`:""}<td>${esc(it.nm)}</td><td>${esc(it.ds)}</td><td>${it.ar}</td><td>${it.sys}</td></tr>`; });
  });
  const total = picked.length + state.custom.length;
  const html = `<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>직무기술서</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>
  <table border="1" cellspacing="0" cellpadding="5" style="border-collapse:collapse;font-family:맑은 고딕,sans-serif;font-size:11pt">

   <tr><td style="background:#eef2ea;font-weight:bold">소속</td><td>노리주간보호센터</td><td style="background:#eef2ea;font-weight:bold">작성일</td><td colspan="2">${d.savedAt}</td></tr>
   <tr><td style="background:#eef2ea;font-weight:bold">업무 수</td><td colspan="4">${total}개</td></tr>
   <tr><th style="background:#d6e2cc;width:64px">주기</th><th style="background:#d6e2cc;width:210px">업무명</th><th style="background:#d6e2cc">업무 내용</th><th style="background:#d6e2cc;width:90px">영역</th><th style="background:#d6e2cc;width:120px">시스템</th></tr>

  </table></body></html>`;
  const blob = new Blob(["﻿" + html], {type:"application/vnd.ms-excel;charset=utf-8"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = `직무기술서_${d.staff}_${d.savedAt}.xls`; a.click();
}
document.getElementById("xlsBtn").onclick = exportExcel;
document.getElementById("mbView").onclick = () => document.querySelector(".mine").scrollIntoView({behavior:"smooth", block:"start"});
</script>
